# EverestQuant shared pre-commit config.
# ADOPTION: copy into a repo root AS `.pre-commit-config.yaml` (leading dot),
# then once per clone: `pip install pre-commit && pre-commit install`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4  # pin; bump deliberately
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: detect-private-key
      - id: check-merge-conflict

  # Uncomment in repos with Terraform (eiq-platform):
  # - repo: https://github.com/antonbabenko/pre-commit-terraform
  #   rev: v1.96.1
  #   hooks:
  #     - id: terraform_fmt
