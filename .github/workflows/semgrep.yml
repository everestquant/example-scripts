name: Semgrep

# Self-contained SAST — public repo can't call the private org reusable
# workflow, so we run semgrep directly with community rulesets (no token).

on:
  pull_request:
    branches: ['**']

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install semgrep
      - run: semgrep scan --config p/ci --config p/python --error
